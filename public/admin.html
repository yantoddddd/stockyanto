<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | AutoOrder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:linear-gradient(135deg,#0a2b5e,#0f3b7a);font-family:'Inter',sans-serif;padding:24px;}
        .container{max-width:1000px;margin:0 auto;}
        .card{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:32px;padding:28px;margin-bottom:28px;}
        h1,h2{color:white;margin-bottom:20px;}
        h2{border-left:4px solid #3b82f6;padding-left:16px;font-size:1.3rem;}
        input,textarea,select{width:100%;padding:12px;margin:10px 0;border-radius:24px;border:1px solid #334155;background:#1e293b;color:white;outline:none;}
        button{background:#3b82f6;border:none;padding:12px 24px;border-radius:40px;color:white;font-weight:600;cursor:pointer;}
        .item{background:#1e293b;padding:16px;border-radius:20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;padding:10px20px;border-radius:40px;opacity:0;transition:0.2s;color:white;}
        .hidden{display:none;}
        .form-group{margin-bottom:15px;}
        label{color:#94a3b8;font-size:0.8rem;margin-bottom:5px;display:block;}
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="loginCard">
        <h1>Admin Panel</h1>
        <input type="password" id="adminKey" placeholder="Kunci Admin">
        <button onclick="login()">Login</button>
    </div>
    <div id="adminContent" style="display:none;">
        <div class="card">
            <h2>Tambah Produk</h2>
            <input type="text" id="productName" placeholder="Nama Produk">
            <textarea id="productDesc" rows="2" placeholder="Deskripsi Produk (opsional)"></textarea>
            <input type="number" id="productPrice" placeholder="Harga">
            <input type="number" id="productStock" placeholder="Stok">
            
            <div class="form-group">
                <label>Tipe Item</label>
                <select id="itemType" onchange="toggleItemFields()">
                    <option value="text">Teks (copy-paste)</option>
                    <option value="file">File (upload)</option>
                    <option value="link">Link</option>
                </select>
            </div>
            <div id="itemTextField">
                <textarea id="itemText" rows="3" placeholder="Kode/teks yang akan diberikan ke customer"></textarea>
            </div>
            <div id="itemFileField" class="hidden">
                <input type="file" id="itemFile">
            </div>
            <div id="itemLinkField" class="hidden">
                <input type="url" id="itemLink" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>Bonus (opsional)</label>
                <select id="bonusType" onchange="toggleBonusFields()">
                    <option value="none">Tidak ada bonus</option>
                    <option value="text">Bonus Teks</option>
                    <option value="file">Bonus File</option>
                    <option value="link">Bonus Link</option>
                </select>
            </div>
            <div id="bonusTextField" class="hidden">
                <textarea id="bonusText" rows="2" placeholder="Teks bonus"></textarea>
            </div>
            <div id="bonusFileField" class="hidden">
                <input type="file" id="bonusFile">
            </div>
            <div id="bonusLinkField" class="hidden">
                <input type="url" id="bonusLink" placeholder="https://...">
            </div>

            <button onclick="addProduct()">Simpan Produk</button>
        </div>
        <div class="card">
            <h2>Daftar Produk</h2>
            <div id="productsList"></div>
        </div>
        <div class="card">
            <h2>Riwayat Order</h2>
            <div id="ordersList"></div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
let adminKey = '';

function toast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#b91c1c' : '#1e293b';
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 3000);
}

function toggleItemFields() {
    const type = document.getElementById('itemType').value;
    document.getElementById('itemTextField').classList.add('hidden');
    document.getElementById('itemFileField').classList.add('hidden');
    document.getElementById('itemLinkField').classList.add('hidden');
    if (type === 'text') document.getElementById('itemTextField').classList.remove('hidden');
    else if (type === 'file') document.getElementById('itemFileField').classList.remove('hidden');
    else if (type === 'link') document.getElementById('itemLinkField').classList.remove('hidden');
}

function toggleBonusFields() {
    const type = document.getElementById('bonusType').value;
    document.getElementById('bonusTextField').classList.add('hidden');
    document.getElementById('bonusFileField').classList.add('hidden');
    document.getElementById('bonusLinkField').classList.add('hidden');
    if (type === 'text') document.getElementById('bonusTextField').classList.remove('hidden');
    else if (type === 'file') document.getElementById('bonusFileField').classList.remove('hidden');
    else if (type === 'link') document.getElementById('bonusLinkField').classList.remove('hidden');
}

async function login() {
    const key = document.getElementById('adminKey').value;
    if (key === 'rahasia123') {
        adminKey = key;
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        await loadProducts();
        await loadOrders();
        toast('Login berhasil');
    } else {
        toast('Kunci salah', true);
    }
}

async function addProduct() {
    const formData = new FormData();
    formData.append('adminKey', adminKey);
    formData.append('name', document.getElementById('productName').value);
    formData.append('description', document.getElementById('productDesc').value);
    formData.append('price', document.getElementById('productPrice').value);
    formData.append('stock', document.getElementById('productStock').value);
    
    const itemType = document.getElementById('itemType').value;
    formData.append('itemType', itemType);
    if (itemType === 'text') formData.append('itemText', document.getElementById('itemText').value);
    else if (itemType === 'file') formData.append('itemFile', document.getElementById('itemFile').files[0]);
    else if (itemType === 'link') formData.append('itemLink', document.getElementById('itemLink').value);
    
    const bonusType = document.getElementById('bonusType').value;
    formData.append('bonusType', bonusType);
    if (bonusType === 'text') formData.append('bonusText', document.getElementById('bonusText').value);
    else if (bonusType === 'file') formData.append('bonusFile', document.getElementById('bonusFile').files[0]);
    else if (bonusType === 'link') formData.append('bonusLink', document.getElementById('bonusLink').value);
    
    const res = await fetch('/api/admin/product', { method: 'POST', body: formData });
    if (res.ok) {
        toast('Produk ditambahkan');
        loadProducts();
        document.getElementById('productName').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productStock').value = '';
        document.getElementById('itemText').value = '';
        document.getElementById('itemLink').value = '';
        document.getElementById('bonusText').value = '';
        document.getElementById('bonusLink').value = '';
        document.getElementById('itemFile').value = '';
        document.getElementById('bonusFile').value = '';
    } else {
        toast('Gagal tambah produk', true);
    }
}

async function loadProducts() {
    const res = await fetch(`/api/admin/products?adminKey=${adminKey}`);
    const data = await res.json();
    const container = document.getElementById('productsList');
    if (data.success && data.products.length) {
        container.innerHTML = data.products.map(p => `
            <div class="item">
                <div><strong>${p.name}</strong> - Rp ${p.price.toLocaleString()} - Stok: ${p.stock}</div>
                <button onclick="deleteProduct(${p.id})" style="background:#b91c1c;">Hapus</button>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<p>Belum ada produk</p>';
    }
}

async function deleteProduct(id) {
    if (confirm('Hapus produk?')) {
        await fetch(`/api/admin/product/${id}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminKey }) });
        loadProducts();
    }
}

async function loadOrders() {
    const res = await fetch(`/api/admin/orders?adminKey=${adminKey}`);
    const data = await res.json();
    const container = document.getElementById('ordersList');
    if (data.success && data.orders.length) {
        container.innerHTML = data.orders.map(o => `
            <div class="item">
                <div><strong>${o.productName}</strong> - ${o.customerName} - ${o.status}</div>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<p>Belum ada order</p>';
    }
}

toggleItemFields();
toggleBonusFields();
</script>
</body>
</html>
