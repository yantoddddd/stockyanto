<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yanto Store | Detail Pesanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .card { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border-radius: 32px; padding: 32px; max-width: 580px; width: 100%; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 45px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo h2 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #ffffff, #94a3f8); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .success-icon { text-align: center; margin-bottom: 20px; }
        .success-icon i { font-size: 4rem; color: #10b981; animation: pulse 0.5s ease; }
        h1 { text-align: center; color: #10b981; font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; }
        .product-name { font-size: 1.2rem; font-weight: 600; color: white; text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .section { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 18px; margin-bottom: 16px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #60a5fa; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .item-content { flex: 1; word-break: break-all; }
        .text-content { color: #e2e8f0; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; }
        .html-preview { background: #0f172a; padding: 12px; border-radius: 12px; color: #e2e8f0; font-size: 0.75rem; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow: auto; border: 1px solid #334155; }
        .chip-btn { background: #334155; border: none; padding: 6px 14px; border-radius: 40px; color: white; font-size: 0.7rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; white-space: nowrap; }
        .chip-btn:hover { background: #3b82f6; transform: translateY(-2px); }
        .link-chip { background: #3b82f6; text-decoration: none; }
        .link-chip:hover { background: #2563eb; }
        .bonus-list { list-style: none; }
        .bonus-list li { color: #e2e8f0; font-size: 0.85rem; padding: 6px 0; display: flex; align-items: center; gap: 8px; }
        .bonus-list li i { color: #f59e0b; font-size: 0.7rem; }
        .footer-note { text-align: center; color: #475569; font-size: 0.65rem; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-back { background: #334155; border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; margin-top: 10px; }
        .btn-back:hover { background: #475569; transform: translateY(-2px); }
        .qr-container { text-align: center; }
        .qr-container h2 { color: white; font-size: 1.2rem; margin-top: 12px; }
        .qris-img { width: 100%; max-width: 220px; margin: 20px auto; display: block; background: white; padding: 16px; border-radius: 24px; animation: fadeIn 0.5s ease; }
        .total-amount { font-size: 1.8rem; font-weight: 700; color: #60a5fa; text-align: center; margin: 16px 0; }
        .status-text { text-align: center; color: #f59e0b; margin: 12px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .refresh-btn, .cancel-btn { border: none; padding: 12px 24px; border-radius: 40px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .refresh-btn { background: #3b82f6; color: white; }
        .refresh-btn:hover { background: #2563eb; transform: translateY(-2px); }
        .cancel-btn { background: #ef4444; color: white; }
        .cancel-btn:hover { background: #dc2626; transform: translateY(-2px); }
        .expiry-text { text-align: center; color: #64748b; font-size: 0.7rem; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        @media (max-width: 480px) { .item-row { flex-direction: column; align-items: flex-start; } .chip-btn { align-self: flex-start; } }
    </style>
</head>
<body>
    <div id="pendingContent" style="display:block;">
        <div class="card">
            <div class="logo"><h2><i class="fas fa-store"></i> Yanto Store</h2></div>
            <div class="qr-container">
                <i class="fas fa-qrcode" style="font-size: 2.5rem; color: #60a5fa;"></i>
                <h2>Scan QRIS untuk Membayar</h2>
                <img id="qrisImage" class="qris-img" alt="QRIS">
                <div class="total-amount">Rp <span id="totalAmount"></span></div>
                <div class="status-text" id="statusText"><i class="fas fa-hourglass-half"></i> Menunggu pembayaran...</div>
                <button class="refresh-btn" onclick="checkStatus()"><i class="fas fa-sync-alt"></i> Cek Status</button>
                <button class="cancel-btn" id="cancelBtn" onclick="cancelOrder()"><i class="fas fa-times-circle"></i> Batalkan Pesanan</button>
                <div class="expiry-text"><i class="far fa-clock"></i> Kadaluarsa: <span id="expiryTime"></span></div>
            </div>
        </div>
    </div>
    <div id="successContent" style="display:none;">
        <div class="card">
            <div class="logo"><h2><i class="fas fa-store"></i> Yanto Store</h2></div>
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h1>Pembayaran Berhasil!</h1>
            <div class="product-name" id="productName"></div>
            <div id="productCodeContainer"></div>
            <div id="bonusContainer" style="display:none;"></div>
            <div style="text-align: center; margin-top: 20px;">
                <a href="/" class="btn-back"><i class="fas fa-home"></i> Kembali ke Beranda</a>
            </div>
            <div class="footer-note"><i class="fas fa-save"></i> Simpan informasi di atas</div>
        </div>
    </div>

    <script>
        const orderCode = window.location.pathname.split('/').pop();
        let pollingInterval = null;
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
        function toast(msg) { const t = document.createElement('div'); t.textContent = msg; t.style.position = 'fixed'; t.style.bottom = '20px'; t.style.left = '50%'; t.style.transform = 'translateX(-50%)'; t.style.background = '#1e293b'; t.style.padding = '8px 16px'; t.style.borderRadius = '40px'; t.style.fontSize = '0.8rem'; t.style.zIndex = '2000'; t.style.color = 'white'; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
        function copyToClipboard(text) { try { navigator.clipboard.writeText(text); toast('📋 Tersalin!'); } catch(e) { const textarea = document.createElement('textarea'); textarea.value = text; document.body.appendChild(textarea); textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea); toast('📋 Tersalin!'); } }
        
        function formatBonus(content) {
            if (!content) return '';
            if (content.includes('\n')) {
                const items = content.split('\n').filter(item => item.trim());
                return `<div class="section"><div class="section-title"><i class="fas fa-gift"></i> Bonus</div><ul class="bonus-list">${items.map(item => `<li><i class="fas fa-star"></i> ${escapeHtml(item.trim())}</li>`).join('')}</ul></div>`;
            }
            return `<div class="section"><div class="section-title"><i class="fas fa-gift"></i> Bonus</div><div class="text-content">${escapeHtml(content)}</div><button class="chip-btn copy-btn" data-copy="${escapeHtml(content).replace(/"/g, '&quot;')}"><i class="fas fa-copy"></i> Salin Teks</button></div>`;
        }
        
        function formatItem(content, type) {
            const isLink = type === 'link' || (type !== 'html' && content.startsWith('http'));
            const isHtml = type === 'html';
            
            if (isHtml) {
                return `<div class="section"><div class="section-title"><i class="fas fa-code"></i> Barang Utama (HTML)</div><div class="item-row"><div class="item-content"><div class="html-preview">${content}</div></div><button class="chip-btn copy-btn" data-copy="${escapeHtml(content).replace(/"/g, '&quot;')}"><i class="fas fa-copy"></i> Salin HTML</button></div></div>`;
            } else if (isLink) {
                return `<div class="section"><div class="section-title"><i class="fas fa-box"></i> Barang Utama</div><div class="item-row"><div class="item-content"><div class="text-content">${escapeHtml(content)}</div></div><div style="display: flex; gap: 8px;"><button class="chip-btn copy-btn" data-copy="${escapeHtml(content).replace(/"/g, '&quot;')}"><i class="fas fa-copy"></i> Salin Link</button><a href="${escapeHtml(content)}" class="chip-btn link-chip" target="_blank"><i class="fas fa-external-link-alt"></i> Buka</a></div></div></div>`;
            } else {
                return `<div class="section"><div class="section-title"><i class="fas fa-box"></i> Barang Utama</div><div class="item-row"><div class="item-content"><div class="text-content">${escapeHtml(content)}</div></div><button class="chip-btn copy-btn" data-copy="${escapeHtml(content).replace(/"/g, '&quot;')}"><i class="fas fa-copy"></i> Salin Teks</button></div></div>`;
            }
        }
        
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.copy-btn');
            if (btn && btn.hasAttribute('data-copy')) { copyToClipboard(btn.getAttribute('data-copy')); }
        });
        
        async function cancelOrder() {
            if (!confirm('Batalkan pesanan ini?')) return;
            try { const res = await fetch(`/api/cancel-order/${orderCode}`, { method: 'POST' }); const data = await res.json(); if (data.success) { toast('Pesanan dibatalkan'); setTimeout(() => location.reload(), 1500); } else { toast('Gagal batalkan'); } } catch(e) { toast('Error'); }
        }
        
        async function loadOrder() {
            try {
                const res = await fetch(`/api/get-order/${orderCode}`); const data = await res.json();
                if (!data.success) { document.body.innerHTML = '<div class="card"><h1>Order Tidak Ditemukan</h1><a href="/" style="color:#60a5fa;">Kembali</a></div>'; return; }
                if (data.status === 'paid') {
                    document.getElementById('pendingContent').style.display = 'none'; document.getElementById('successContent').style.display = 'block';
                    document.getElementById('productName').innerText = data.productName;
                    document.getElementById('productCodeContainer').innerHTML = formatItem(data.productCode, data.itemType || (data.productCode.startsWith('http') ? 'link' : 'text'));
                    if (data.bonusContent && data.bonusContent !== '') {
                        document.getElementById('bonusContainer').innerHTML = formatBonus(data.bonusContent);
                        document.getElementById('bonusContainer').style.display = 'block';
                    }
                } else {
                    document.getElementById('qrisImage').src = data.qrisImage; document.getElementById('totalAmount').innerText = data.totalAmount.toLocaleString(); document.getElementById('expiryTime').innerText = new Date(data.expiredAt).toLocaleString();
                    startPolling();
                }
            } catch (err) { console.error(err); }
        }
        
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                try { const res = await fetch(`/api/check-payment/${orderCode}`); const data = await res.json(); if (data.status === 'paid') { clearInterval(pollingInterval); document.getElementById('statusText').innerHTML = '<i class="fas fa-check-circle"></i> Pembayaran BERHASIL!'; setTimeout(() => location.reload(), 1500); } else if (data.status === 'expired') { clearInterval(pollingInterval); document.getElementById('statusText').innerHTML = '<i class="fas fa-times-circle"></i> QRIS kadaluarsa'; } } catch(e) {}
            }, 5000);
        }
        
        async function checkStatus() {
            const statusDiv = document.getElementById('statusText'); statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengecek...';
            try { const res = await fetch(`/api/check-payment/${orderCode}`); const data = await res.json(); if (data.status === 'paid') { statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Pembayaran BERHASIL!'; setTimeout(() => location.reload(), 1500); } else if (data.status === 'expired') { statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> QRIS kadaluarsa'; } else { statusDiv.innerHTML = '<i class="fas fa-hourglass-half"></i> Masih menunggu pembayaran'; } } catch(e) { statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal mengecek'; }
        }
        
        loadOrder();
    </script>
</body>
</html>
