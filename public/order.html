<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yanto Store | Detail Pesanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo h2 {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #94a3f8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .menu-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(16px);
            z-index: 1000;
            transition: 0.3s ease;
            padding: 70px 20px 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar.open { right: 0; }
        .sidebar .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }
        .sidebar .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-title {
            color: #94a3b8;
            font-size: 0.65rem;
            text-transform: uppercase;
            margin: 15px 0 8px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }
        .success-icon { text-align: center; margin-bottom: 20px; }
        .success-icon i { font-size: 4rem; color: #10b981; }
        h1 { text-align: center; color: #10b981; font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; }
        .product-name { font-size: 1.2rem; font-weight: 600; color: white; text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .section { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 18px; margin-bottom: 16px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #60a5fa; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .link-btn { display: inline-flex; align-items: center; gap: 8px; background: #3b82f6; color: white; padding: 10px 18px; border-radius: 40px; text-decoration: none; font-weight: 500; font-size: 0.85rem; transition: 0.2s; }
        .link-btn:hover { background: #2563eb; transform: translateY(-2px); }
        .text-content { color: #e2e8f0; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; }
        .bonus-list { list-style: none; }
        .bonus-list li { color: #e2e8f0; font-size: 0.85rem; padding: 6px 0; display: flex; align-items: center; gap: 8px; }
        .bonus-list li i { color: #f59e0b; font-size: 0.7rem; }
        .footer-note { text-align: center; color: #475569; font-size: 0.65rem; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .qr-container { text-align: center; }
        .qr-container h2 { color: white; font-size: 1.2rem; margin-top: 12px; }
        .qris-img { width: 100%; max-width: 220px; margin: 20px auto; display: block; background: white; padding: 16px; border-radius: 24px; }
        .total-amount { font-size: 1.8rem; font-weight: 700; color: #60a5fa; text-align: center; margin: 16px 0; }
        .status-text { text-align: center; color: #f59e0b; margin: 12px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .refresh-btn { background: #3b82f6; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; width: 100%; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .expiry-text { text-align: center; color: #64748b; font-size: 0.7rem; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        @media (max-width: 480px) { .card { padding: 24px; } h1 { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="pendingContent" style="display:block;">
        <div class="card">
            <div class="header">
                <div class="logo"><h2><i class="fas fa-store"></i> Yanto Store</h2></div>
                <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            </div>
            <div class="qr-container">
                <i class="fas fa-qrcode" style="font-size: 2.5rem; color: #60a5fa;"></i>
                <h2>Scan QRIS untuk Membayar</h2>
                <img id="qrisImage" class="qris-img" alt="QRIS">
                <div class="total-amount">Rp <span id="totalAmount"></span></div>
                <div class="status-text" id="statusText"><i class="fas fa-hourglass-half"></i> Menunggu pembayaran...</div>
                <button class="refresh-btn" onclick="checkStatus()"><i class="fas fa-sync-alt"></i> Cek Status</button>
                <div class="expiry-text"><i class="far fa-clock"></i> Kadaluarsa: <span id="expiryTime"></span></div>
            </div>
        </div>
    </div>
    <div id="successContent" style="display:none;">
        <div class="card">
            <div class="header">
                <div class="logo"><h2><i class="fas fa-store"></i> Yanto Store</h2></div>
                <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            </div>
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h1>Pembayaran Berhasil!</h1>
            <div class="product-name" id="productName"></div>
            <div class="section">
                <div class="section-title"><i class="fas fa-box"></i> Barang Utama</div>
                <div class="section-content" id="productCodeContainer"></div>
            </div>
            <div id="bonusContainer" style="display:none;">
                <div class="section">
                    <div class="section-title"><i class="fas fa-gift"></i> Bonus</div>
                    <div class="section-content" id="bonusContent"></div>
                </div>
            </div>
            <div class="footer-note"><i class="fas fa-save"></i> Simpan informasi di atas</div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        <div class="sidebar-title">MENU</div>
        <a href="/" class="menu-item"><i class="fas fa-home"></i> Beranda</a>
        <div class="sidebar-title">BANTUAN</div>
        <a href="https://t.me/Yantoidiotbruh" target="_blank" class="menu-item"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <a href="https://wa.me/6289676041776" target="_blank" class="menu-item"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </div>

    <script>
        const orderCode = window.location.pathname.split('/').pop();
        
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        
        function formatBonus(content) {
            if (content.includes('\n')) {
                const items = content.split('\n').filter(item => item.trim());
                return `<ul class="bonus-list">${items.map(item => `<li><i class="fas fa-star"></i> ${escapeHtml(item.trim())}</li>`).join('')}</ul>`;
            }
            return `<div class="text-content">${escapeHtml(content)}</div>`;
        }
        
        function formatItem(content) {
            if (content.startsWith('http')) {
                return `<a href="${escapeHtml(content)}" class="link-btn" target="_blank"><i class="fas fa-external-link-alt"></i> Buka Link</a>`;
            }
            return `<div class="text-content">${escapeHtml(content)}</div>`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        async function loadOrder() {
            try {
                const res = await fetch(`/api/get-order/${orderCode}`);
                const data = await res.json();
                if (!data.success) {
                    document.body.innerHTML = '<div class="card"><h1>Order Tidak Ditemukan</h1><a href="/" style="color:#60a5fa;">Kembali</a></div>';
                    return;
                }
                if (data.status === 'paid') {
                    document.getElementById('pendingContent').style.display = 'none';
                    document.getElementById('successContent').style.display = 'block';
                    document.getElementById('productName').innerText = data.productName;
                    document.getElementById('productCodeContainer').innerHTML = formatItem(data.productCode);
                    if (data.bonusContent && data.bonusContent !== '') {
                        document.getElementById('bonusContent').innerHTML = formatBonus(data.bonusContent);
                        document.getElementById('bonusContainer').style.display = 'block';
                    }
                } else {
                    document.getElementById('qrisImage').src = data.qrisImage;
                    document.getElementById('totalAmount').innerText = data.totalAmount.toLocaleString();
                    document.getElementById('expiryTime').innerText = new Date(data.expiredAt).toLocaleString();
                    startPolling();
                }
            } catch (err) { console.error(err); }
        }
        
        let pollingInterval;
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/check-payment/${orderCode}`);
                    const data = await res.json();
                    if (data.status === 'paid') {
                        clearInterval(pollingInterval);
                        document.getElementById('statusText').innerHTML = '<i class="fas fa-check-circle"></i> Pembayaran BERHASIL!';
                        setTimeout(() => location.reload(), 1500);
                    } else if (data.status === 'expired') {
                        clearInterval(pollingInterval);
                        document.getElementById('statusText').innerHTML = '<i class="fas fa-times-circle"></i> QRIS kadaluarsa';
                    }
                } catch(e) {}
            }, 5000);
        }
        
        async function checkStatus() {
            const statusDiv = document.getElementById('statusText');
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengecek...';
            try {
                const res = await fetch(`/api/check-payment/${orderCode}`);
                const data = await res.json();
                if (data.status === 'paid') {
                    statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Pembayaran BERHASIL!';
                    setTimeout(() => location.reload(), 1500);
                } else if (data.status === 'expired') {
                    statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> QRIS kadaluarsa';
                } else {
                    statusDiv.innerHTML = '<i class="fas fa-hourglass-half"></i> Masih menunggu pembayaran';
                }
            } catch(e) {
                statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal mengecek';
            }
        }
        
        loadOrder();
    </script>
</body>
</html>
