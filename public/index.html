<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoOrder | Beli Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a2b5e 0%, #0f3b7a 100%); font-family: 'Inter', 'Poppins', sans-serif; min-height: 100vh; padding: 24px 16px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #ffffff, #b8e1ff); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .header p { color: #cbd5e6; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .product-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border-radius: 28px; padding: 24px; border: 1px solid rgba(255, 255, 255, 0.15); transition: 0.3s; cursor: pointer; }
        .product-card:hover { transform: translateY(-6px); background: rgba(255,255,255,0.12); }
        .product-name { font-size: 1.4rem; font-weight: 700; color: white; margin-bottom: 12px; }
        .product-price { font-size: 1.8rem; font-weight: 800; color: #60a5fa; margin: 12px 0; }
        .product-stock { font-size: 0.8rem; color: #9ca3af; margin-bottom: 20px; }
        .btn-buy { background: linear-gradient(95deg, #2563eb, #1d4ed8); border: none; width: 100%; padding: 14px; border-radius: 40px; font-weight: 700; color: white; cursor: pointer; text-align: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0f172a; border-radius: 32px; padding: 32px; max-width: 500px; width: 90%; border: 1px solid #334155; }
        .modal-content h3 { font-size: 1.6rem; font-weight: 700; color: white; }
        .modal-price { font-size: 1.5rem; font-weight: 800; color: #60a5fa; margin: 10px 0; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 24px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 1rem; outline: none; }
        .btn-primary { background: #3b82f6; width: 100%; padding: 14px; border: none; border-radius: 40px; font-weight: 700; color: white; cursor: pointer; margin-top: 12px; }
        .btn-secondary { background: #334155; width: 100%; padding: 14px; border: none; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; margin-top: 8px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; padding: 12px 24px; border-radius: 40px; font-size: 0.9rem; opacity: 0; transition: 0.2s; z-index: 1100; color: white; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-store"></i> AutoOrder Digital</h1>
        <p>Akun Roblox | Web | APK | DLL | Bayar pakai QRIS</p>
    </div>
    <div class="products-grid" id="productsGrid">Loading...</div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalProductName"></h3>
        <div class="modal-price" id="modalPrice"></div>
        <input type="text" id="customerName" placeholder="Nama lengkap *" required>
        <input type="email" id="customerEmail" placeholder="Email (opsional)">
        <button class="btn-primary" id="createOrderBtn"><i class="fas fa-credit-card"></i> Buat Pesanan</button>
        <button class="btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i> Tutup</button>
        <div id="loadingIndicator" style="display:none; text-align:center; margin-top:15px;"><span class="loading"></span> Membuat pesanan...</div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    const QRISPY_TOKEN = 'cki_IBpAYezwDHbfrMuENZMFvFw5mI94M11dAT146N0Ar4HrOWKi';
    const QRISPY_API_URL = 'https://api.qrispy.id';
    let currentProduct = null;

    function toast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = isError ? '#b91c1c' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    async function loadProducts() {
        try {
            const res = await fetch('/api/products');
            const data = await res.json();
            const grid = document.getElementById('productsGrid');
            if (!data.products || data.products.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:#cbd5e6; grid-column:1/-1;">Belum ada produk.</div>';
                return;
            }
            grid.innerHTML = data.products.map(p => `
                <div class="product-card" onclick='openModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'>
                    <div class="product-name"><i class="fas fa-box"></i> ${escapeHtml(p.name)}</div>
                    <div class="product-price">Rp ${(p.price || 0).toLocaleString()}</div>
                    <div class="product-stock"><i class="fas fa-database"></i> Stok: ${p.stock}</div>
                    <div class="btn-buy">${p.stock > 0 ? '<i class="fas fa-shopping-cart"></i> Beli Sekarang' : '<i class="fas fa-ban"></i> Stok Habis'}</div>
                </div>
            `).join('');
        } catch(e) { toast('Gagal load produk', true); }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    function openModal(product) {
        if (product.stock <= 0) { toast('Stok habis!', true); return; }
        currentProduct = product;
        document.getElementById('modalProductName').innerText = product.name;
        document.getElementById('modalPrice').innerHTML = `Rp ${product.price.toLocaleString()}`;
        document.getElementById('customerName').value = '';
        document.getElementById('customerEmail').value = '';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        currentProduct = null;
    }

    document.getElementById('createOrderBtn').onclick = async () => {
        const name = document.getElementById('customerName').value.trim();
        if (!name) { toast('Nama wajib diisi', true); return; }
        const email = document.getElementById('customerEmail').value.trim();

        const btn = document.getElementById('createOrderBtn');
        const loading = document.getElementById('loadingIndicator');
        btn.style.display = 'none';
        loading.style.display = 'block';

        try {
            // Hitung admin fee 2.5%
            const adminFee = Math.round(currentProduct.price * 0.025);
            const totalAmount = currentProduct.price + adminFee;

            // 1. Generate QRIS dari frontend (biar ga kena blokir)
            const qrisRes = await fetch(`${QRISPY_API_URL}/api/payment/qris/generate`, {
                method: 'POST',
                headers: { 'X-API-Token': QRISPY_TOKEN, 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: totalAmount })
            });
            const qrisData = await qrisRes.json();
            if (qrisData.status !== 'success') throw new Error(qrisData.message || 'Gagal generate QRIS');

            // 2. Simpan order ke backend
            const orderRes = await fetch('/api/create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productId: currentProduct.id,
                    customerName: name,
                    customerEmail: email,
                    qrisId: qrisData.data.qris_id,
                    qrisImage: qrisData.data.qris_image_url,
                    totalAmount: totalAmount,
                    adminFee: adminFee,
                    expiredAt: qrisData.data.expired_at
                })
            });
            const orderData = await orderRes.json();
            if (orderData.success) {
                window.location.href = `/order/${orderData.orderCode}`;
            } else {
                throw new Error(orderData.error || 'Gagal simpan order');
            }
        } catch (err) {
            toast(err.message, true);
            btn.style.display = 'block';
            loading.style.display = 'none';
        }
    };

    loadProducts();
</script>
</body>
</html>
