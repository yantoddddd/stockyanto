<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yanto Store | Beli Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 24px 16px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease 0.1s both;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #94a3f8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .header p {
            color: #94a3b8;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            animation: fadeIn 0.4s ease;
            animation-fill-mode: both;
        }
        .product-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }
        .product-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .product-desc {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
            margin: 12px 0;
        }
        .product-stock {
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-buy {
            background: linear-gradient(95deg, #2563eb, #1d4ed8);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-buy:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
        .btn-buy:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background: #0f172a;
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #334155;
        }
        .modal-content h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }
        .modal-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #60a5fa;
            margin: 12px 0;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 28px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .btn-primary {
            background: #3b82f6;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: #2563eb;
        }
        .btn-secondary {
            background: #334155;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            opacity: 0;
            transition: 0.3s;
            z-index: 1100;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-store"></i> Yanto Store</h1>
        <p>Akun Roblox | Web | APK | DLL | Bayar pakai QRIS</p>
    </div>
    <div class="products-grid" id="productsGrid">
        <div style="text-align:center; color:#64748b; grid-column:1/-1;">
            <i class="fas fa-spinner fa-pulse"></i> Memuat produk...
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalProductName"></h3>
        <div id="modalProductDesc" style="color:#94a3b8; font-size:0.8rem; margin:5px 0;"></div>
        <div class="modal-price" id="modalPrice"></div>
        <input type="text" id="customerName" placeholder="Nama lengkap" required>
        <button class="btn-primary" id="createOrderBtn">
            <i class="fas fa-credit-card"></i> Buat Pesanan
        </button>
        <button class="btn-secondary" onclick="closeModal()">
            <i class="fas fa-times"></i> Tutup
        </button>
        <div id="loadingIndicator" style="display:none; text-align:center; margin-top:15px;">
            <span class="loading"></span> Membuat pesanan...
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    const QRISPY_TOKEN = 'cki_IBpAYezwDHbfrMuENZMFvFw5mI94M11dAT146N0Ar4HrOWKi';
    const QRISPY_API_URL = 'https://api.qrispy.id';
    let currentProduct = null;

    function toast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        t.style.background = isError ? '#b91c1c' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    async function loadProducts() {
        try {
            const res = await fetch('/api/products');
            const data = await res.json();
            const grid = document.getElementById('productsGrid');
            if (!data.products || data.products.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:#64748b; grid-column:1/-1;"><i class="fas fa-inbox"></i> Belum ada produk</div>';
                return;
            }
            grid.innerHTML = data.products.map((p, i) => `
                <div class="product-card" style="animation-delay: ${i * 0.05}s" onclick='openModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'>
                    <div class="product-name">
                        <i class="fas fa-box"></i> ${escapeHtml(p.name)}
                    </div>
                    <div class="product-desc">${escapeHtml(p.description || '')}</div>
                    <div class="product-price">Rp ${(p.price || 0).toLocaleString()}</div>
                    <div class="product-stock">
                        <i class="fas fa-database"></i> Stok: ${p.stock}
                    </div>
                    <div class="btn-buy">
                        ${p.stock > 0 ? '<i class="fas fa-shopping-cart"></i> Beli Sekarang' : '<i class="fas fa-ban"></i> Stok Habis'}
                    </div>
                </div>
            `).join('');
        } catch(e) { toast('Gagal load produk', true); }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function openModal(product) {
        if (product.stock <= 0) { toast('Stok habis!', true); return; }
        currentProduct = product;
        document.getElementById('modalProductName').innerText = product.name;
        document.getElementById('modalProductDesc').innerText = product.description || '';
        document.getElementById('modalPrice').innerHTML = `Rp ${product.price.toLocaleString()}`;
        document.getElementById('customerName').value = '';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        currentProduct = null;
    }

    async function generateQRIS(amount) {
        const response = await fetch(`${QRISPY_API_URL}/api/payment/qris/generate`, {
            method: 'POST',
            headers: { 'X-API-Token': QRISPY_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount })
        });
        const data = await response.json();
        if (data.status !== 'success') throw new Error(data.message || 'Gagal generate QRIS');
        return data.data;
    }

    document.getElementById('createOrderBtn').onclick = async () => {
        const name = document.getElementById('customerName').value.trim();
        if (!name) { toast('Nama wajib diisi', true); return; }

        const btn = document.getElementById('createOrderBtn');
        const loading = document.getElementById('loadingIndicator');
        btn.style.display = 'none';
        loading.style.display = 'block';

        try {
            const totalAmount = currentProduct.price;
            const qrisData = await generateQRIS(totalAmount);
            
            const orderRes = await fetch('/api/create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productId: currentProduct.id,
                    customerName: name,
                    customerEmail: '-',
                    qrisId: qrisData.qris_id,
                    qrisImage: qrisData.qris_image_url,
                    totalAmount: totalAmount,
                    expiredAt: qrisData.expired_at
                })
            });
            const orderData = await orderRes.json();
            if (!orderData.success) throw new Error(orderData.error);
            
            window.location.href = `/order/${orderData.orderCode}`;
        } catch (err) {
            toast(err.message, true);
            btn.style.display = 'block';
            loading.style.display = 'none';
        }
    };

    loadProducts();
</script>
</body>
</html>
